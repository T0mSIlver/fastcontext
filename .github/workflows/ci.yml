name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep (Grep tool dependency)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync environment
        run: uv sync
      - name: Lint
        run: uv run ruff check
      - name: Tests
        run: uv run pytest -q

  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eval
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync environment
        run: uv sync
      - name: Tests
        run: uv run pytest -q
